version: "3.9"

services:
  # ── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build: .
    container_name: clv-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models   # persist trained artefacts outside container
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit frontend ────────────────────────────────────────────────────
  streamlit:
    build: .
    container_name: clv-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      streamlit run app/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    depends_on:
      api:
        condition: service_healthy
